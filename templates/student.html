{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Расписание ученика</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  h2 { margin-bottom: 20px; }
  #calendar { display: grid; grid-template-columns: repeat(7, 60px); grid-gap: 5px; }
  .day { 
    width: 60px; height: 60px; 
    border: 1px solid #ccc; 
    display: flex; justify-content: center; align-items: center;
    cursor: pointer; border-radius: 4px; position: relative;
  }
  .day.has-class { color: #fff; font-weight: bold; }
  #popup {
    position: absolute; padding: 10px; background: #333; color: #fff;
    border-radius: 4px; display: none; z-index: 100; width: 180px;
  }
</style>
</head>
<body>

<h2>Моё расписание</h2>
<div id="calendar"></div>
<div id="popup"></div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="{% static 'js/student.js' %}"></script>

</body>
</html>
